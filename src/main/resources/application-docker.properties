server.port=8020
management.server.port=8020

#######################################
#	Database
#######################################
spring.data.mongodb.uri=mongodb://mongo-db:27017
spring.data.mongodb.schema-name=FSE_GTW
data.mongodb.crypting.datakey-id-name=
azure.kms.tenant-id=
azure.kms.client-id=
azure.kms.client-secret=
azure.kms.master-key-name=
azure.kms.key-vault-endpoint=
#######################################
#			INI CONFIG
#######################################
ini.client.enable-log=true
ini.client.enable-ssl=true

# TrustStore -> SSL Context
ini.client.auth-cert.path=auth/A1#GTW-INI.p12
ini.client.auth-cert.password=123456
ini.client.auth-cert.alias=
# KeyStore -> Digital Signature SAML
ini.client.ds-cert.path=sign/S1#GTW-INI.p12
ini.client.ds-cert.password=123456
ini.client.ds-cert.alias=
ini.client.mock-enable=true

####### LOGGING OUTPUT FORMAT ############
# Must be one of console, json
#######################################
log.output.format=console
log.level=trace
log.kafka-log.enable=true
kafka.log.base-topic=MDS-SA-0004_FU_001_LOG

ms.url.gtw-config=http://it-fse-gtw-config:8018

logging.level.it.finanze.sanita.fse2.ms.iniclient=debug

#######################################
#  				KAFKA 
#######################################
kafka.bootstrap-servers=kafka:9092
spring.sleuth.messaging.kafka.enabled=false
kafka.properties.security.protocol=PLAINTEXT
kafka.properties.sasl.mechanism=PLAINTEXT
kafka.properties.sasl.jaas.config=PLAINTEXT
kafka.properties.ssl.truststore.location=PLAINTEXT
kafka.properties.ssl.truststore.password=PLAINTEXT
kafka.oauth.tenantId=
kafka.oauth.appId=
kafka.oauth.pfxPathName=
kafka.oauth.pwd=
ms.url.gtw-crash-program-validator=http://localhost:8080
govway-url=
govway-port=
govway-user=
govway-pass=

########OPENTELEMETRY################################
otel.traces.exporter=none
otel.logs.exporter=none
otel.metrics.exporter=none

otel.propagators=tracecontext,baggage

#######################################
# UAR
#######################################
uar.client.mock-enable=false